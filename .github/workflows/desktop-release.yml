name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        type: string

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      # Clone source code from Bitbucket (main repo)
      - name: Clone source from Bitbucket
        run: |
          git clone --depth 1 --branch dev https://${{ secrets.BITBUCKET_USER }}:${{ secrets.BITBUCKET_APP_PASSWORD }}@bitbucket.org/mosesdevelopment/bookfit.git .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Frontend/fitness-saas/apps/desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: Frontend/fitness-saas
        run: pnpm install --frozen-lockfile

      - name: Build admin app
        working-directory: Frontend/fitness-saas
        run: pnpm --filter @fitness/admin build

      - name: Set version in tauri.conf.json
        working-directory: Frontend/fitness-saas/apps/desktop/src-tauri
        run: |
          if command -v jq &> /dev/null; then
            jq '.version = "${{ inputs.version }}"' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          else
            sed -i.bak 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' tauri.conf.json
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Frontend/fitness-saas/apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: desktop-v${{ inputs.version }}
          releaseName: 'BookFit Desktop v${{ inputs.version }}'
          releaseBody: |
            BookFit Desktop App v${{ inputs.version }}

            ## Downloads
            - **macOS**: BookFit_universal.dmg (Intel + Apple Silicon)
            - **Windows**: BookFit_x64-setup.exe
          releaseDraft: false
          prerelease: false
          owner: georgemosesgroup
          repo: bookfit-desktop

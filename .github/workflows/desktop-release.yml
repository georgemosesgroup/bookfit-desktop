name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        type: string

env:
  # Tauri updater signing (ed25519 — NOT the same as codesigning)
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # macOS code signing (self-signed cert → stable TCC identity across builds).
  # See scripts/setup-codesign.sh and docs/runbooks/codesign-setup.md.
  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      # Clone source code from Bitbucket (main repo)
      - name: Clone source from Bitbucket
        run: |
          git clone --depth 1 --branch dev https://x-token-auth:${{ secrets.BITBUCKET_APP_PASSWORD }}@bitbucket.org/mosesdevelopment/bookfit.git .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Frontend/fitness-saas/apps/desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: Frontend/fitness-saas
        run: pnpm install --frozen-lockfile

      - name: Build admin app
        working-directory: Frontend/fitness-saas
        run: pnpm --filter @fitness/admin build

      - name: Set version in tauri.conf.json
        working-directory: Frontend/fitness-saas/apps/desktop/src-tauri
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${{ inputs.version }}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2));
          "
          echo "Version set to ${{ inputs.version }}"

      # Import the self-signed code-signing certificate into a temporary
      # keychain on macOS runners only. Gives tauri-action a stable signing
      # identity so TCC persists user permissions across updates.
      # If secrets are unset (first time this workflow runs before the secrets
      # are configured) this step becomes a harmless no-op.
      - name: Import macOS code-signing certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/bookfit-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/bookfit-codesign.p12"

          # Decode the .p12 from the base64 secret
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          # Create a fresh keychain, unlock it, add to search list
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Import the cert + allow codesign to use it without prompting
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Tauri-bundler internally validates the signing identity via
          # `security find-identity -v -p codesigning`, which filters by the
          # codesigning trust policy. Self-signed certs do not pass that
          # filter unless we explicitly trust them. Make the cert trusted
          # system-wide using sudo (available without a password on GitHub
          # Actions runners) so tauri-bundler + codesign both accept it.
          CERT_PEM="$RUNNER_TEMP/bookfit-cert.pem"
          security find-certificate -c "BookFit Self-Signed" -p "$KEYCHAIN_PATH" > "$CERT_PEM"
          sudo security add-trusted-cert \
            -d \
            -r trustRoot \
            -p codeSign \
            -k /Library/Keychains/System.keychain \
            "$CERT_PEM"

          # Also export the SHA-1 hash as APPLE_SIGNING_IDENTITY — more
          # robust than the CN (no ambiguity if multiple certs share a name).
          CERT_SHA=$(security find-identity -v -p codesigning \
            | awk -F'"' '/BookFit Self-Signed/{print; exit}' \
            | awk '{print $2}')
          if [[ -z "$CERT_SHA" ]]; then
            echo "❌ Could not resolve 'BookFit Self-Signed' as a valid codesigning identity"
            echo "Full identity listing:"
            security find-identity -v -p codesigning
            echo "All identities:"
            security find-identity "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "Resolved signing identity SHA-1: $CERT_SHA"
          echo "APPLE_SIGNING_IDENTITY=$CERT_SHA" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable tauri-action's built-in cert import — it creates a fresh
          # keychain WITHOUT the trust setting we added system-wide, so
          # tauri-bundler's `find-identity -v -p codesigning` returns 0. We
          # do our own import with explicit trust in the step above, and
          # pass the SHA-1 via APPLE_SIGNING_IDENTITY (set via GITHUB_ENV).
          APPLE_CERTIFICATE: ""
          APPLE_CERTIFICATE_PASSWORD: ""
        with:
          projectPath: Frontend/fitness-saas/apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: desktop-v${{ inputs.version }}
          releaseName: 'BookFit Desktop v${{ inputs.version }}'
          releaseBody: |
            BookFit Desktop App v${{ inputs.version }}

            ## Downloads
            - **macOS**: BookFit_universal.dmg (Intel + Apple Silicon)
            - **Windows**: BookFit_x64-setup.exe
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          owner: georgemosesgroup
          repo: bookfit-desktop

      # Always clean up the temporary keychain, even on build failure.
      - name: Clean up signing keychain
        if: always() && matrix.platform == 'macos-latest' && env.KEYCHAIN_PATH != ''
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

  # Notify all connected users via SSE after both builds complete
  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get admin token
        id: auth
        run: |
          TOKEN=$(curl -sf https://api.bookfit.mosesdev.com/api/admin/auth/login \
            -H "Content-Type: application/json" \
            -H "X-Tenant-Slug: aluradubai" \
            -d '{"email":"${{ secrets.ADMIN_EMAIL }}","password":"${{ secrets.ADMIN_PASSWORD }}"}' \
            | jq -r '.data.token')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Broadcast desktop update via SSE
        run: |
          curl -sf https://api.bookfit.mosesdev.com/api/admin/system/desktop-update \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "X-Tenant-Slug: aluradubai" \
            -d '{"version":"${{ inputs.version }}","notes":"BookFit Desktop v${{ inputs.version }} is available","critical":false}'
          echo "SSE broadcast sent for v${{ inputs.version }}"
